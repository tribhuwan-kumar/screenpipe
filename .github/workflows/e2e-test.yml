name: E2E Tests

env:
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_DEV_CODEGEN_UNITS: "16"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-e2e-test:
    name: Windows E2E Tests
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Install Scream on Windows
      shell: powershell
      run: |
        Invoke-WebRequest https://github.com/duncanthrax/scream/releases/download/4.0/Scream4.0.zip -OutFile Scream4.0.zip
        Expand-Archive -Path Scream4.0.zip -DestinationPath Scream
        openssl req -batch -verbose -x509 -newkey rsa -keyout ScreamCertificate.pvk -out ScreamCertificate.cer -nodes -extensions v3_req
        openssl pkcs12 -export -nodes -in ScreamCertificate.cer -inkey ScreamCertificate.pvk -out ScreamCertificate.pfx -passout pass:

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Sign and Install Scream Driver on Windows
      shell: powershell
      run: |
        signtool sign /v /fd SHA256 /f ScreamCertificate.pfx Scream\Install\driver\x64\Scream.cat
        Import-Certificate -FilePath ScreamCertificate.cer -CertStoreLocation Cert:\LocalMachine\root
        Import-Certificate -FilePath ScreamCertificate.cer -CertStoreLocation Cert:\LocalMachine\TrustedPublisher
        Scream\Install\helpers\devcon-x64.exe install Scream\Install\driver\x64\Scream.inf *Scream
      timeout-minutes: 5

    - name: Start Windows Audio Service
      shell: powershell
      run: |
        $service = Get-Service -Name audiosrv
        if ($service.Status -ne 'Running') {
          net start audiosrv
        } else {
          Write-Host "Audio service is already running"
        }

    - name: Cache Windows build artifacts
      uses: actions/cache@v4
      with:
        path: |
          apps/screenpipe-app-tauri/src-tauri/ffmpeg
          apps/screenpipe-app-tauri/src-tauri/vcredist
          apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.19.2
          apps/screenpipe-app-tauri/src-tauri/bun-x86_64-pc-windows-msvc.exe
        key: Windows-e2e-artifacts-v2-${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        restore-keys: |
          Windows-e2e-artifacts-v2-

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        override: true
        rustflags: ""
        target: x86_64-pc-windows-msvc

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      shell: bash

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/screenpipe-app-tauri/src-tauri
        shared-key: screenpipe-tauri-e2e

    - name: Configure Bun cache on same drive as workspace (Windows perf fix)
      shell: pwsh
      run: |
        $drive = (Split-Path $env:GITHUB_WORKSPACE -Qualifier).TrimEnd(':')
        echo "BUN_INSTALL_CACHE_DIR=${drive}:/bun" >> $env:GITHUB_ENV
        echo "BUN_INSTALL_GLOBAL_DIR=${drive}:/bun-global" >> $env:GITHUB_ENV

    - name: Install frontend dependencies
      working-directory: ./apps/screenpipe-app-tauri
      run: bun install --frozen-lockfile

    - name: Download ONNX Runtime (CPU) for Windows
      shell: pwsh
      run: |
        $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.19.2/onnxruntime-win-x64-1.19.2.zip"
        $tauriDir = "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.19.2"
        $ortDir = "ort-system-lib"
        Invoke-WebRequest -Uri $url -OutFile "onnxruntime-win-x64-1.19.2.zip"
        if (Test-Path $tauriDir) { Remove-Item $tauriDir -Recurse -Force }
        7z x onnxruntime-win-x64-1.19.2.zip -o"apps/screenpipe-app-tauri/src-tauri/" -y
        if (Test-Path $ortDir) { Remove-Item $ortDir -Recurse -Force }
        Copy-Item -Path $tauriDir -Destination $ortDir -Recurse -Force

    - name: Set ORT env vars
      shell: bash
      run: |
        echo "ORT_STRATEGY=system" >> $GITHUB_ENV
        echo "ORT_LIB_LOCATION=${{ github.workspace }}/ort-system-lib" >> $GITHUB_ENV

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ./apps/screenpipe-app-tauri/.next
        key: ${{ runner.os }}-next-v2-${{ hashFiles('apps/screenpipe-app-tauri/package.json', 'apps/screenpipe-app-tauri/bun.lock', 'apps/screenpipe-app-tauri/next.config.mjs', 'apps/screenpipe-app-tauri/postcss.config.mjs', 'apps/screenpipe-app-tauri/app/**', 'apps/screenpipe-app-tauri/components/**', 'apps/screenpipe-app-tauri/lib/**', 'apps/screenpipe-app-tauri/styles/**') }}
        restore-keys: |
          ${{ runner.os }}-next-v2-

    - name: Build
      uses: tauri-apps/tauri-action@v0.5.17
      env:
        OPENBLAS_PATH: ${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/openblas
      with:
        args: "--no-sign --debug --no-bundle -- --features e2e"
        projectPath: "./apps/screenpipe-app-tauri"
        tauriScript: bunx tauri -v

    - name: Run E2E Tests
      shell: pwsh
      working-directory: ./apps/screenpipe-app-tauri
      env:
        RECORD_VIDEO: "true"
      run: |
        bun run test:e2e

    - name: Upload E2E Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-e2e-test-artifacts
        path: |
          ./apps/screenpipe-app-tauri/e2e/videos
          ./apps/screenpipe-app-tauri/e2e/screenshots

    - name: Upload Screenpipe data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-screenpipe-data
        include-hidden-files: true
        path: ./apps/screenpipe-app-tauri/.e2e

  linux-e2e-test:
    name: Linux E2E Tests
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Cache and install all Linux dependencies
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        version: ${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        packages: >
          tesseract-ocr libtesseract-dev ffmpeg pkg-config build-essential libglib2.0-dev
          libgtk-3-dev libwebkit2gtk-4.1-dev clang cmake
          libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev
          libasound2-dev libxdo-dev
          g++ libssl-dev libsoup-3.0-0 libsdl2-dev libclang-dev libxtst-dev libx11-dev
          libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev
          libxi-dev libgl1-mesa-dev libasound2-dev libpulse-dev
          curl desktop-file-utils xdg-utils dbus-x11 xvfb
          x11-xserver-utils pkg-config libsqlite3-dev libbz2-dev
          zlib1g-dev libonig-dev libayatana-appindicator3-dev
          libsamplerate-dev libwebrtc-audio-processing-dev libgtk-3-dev
          libwebkit2gtk-4.1-dev webkit2gtk-driver librsvg2-dev
          patchelf x11-utils x11-apps xdotool openbox xterm
          fonts-liberation imagemagick fonts-dejavu alsa-utils
          pulseaudio pulseaudio-utils libpipewire-0.3-dev
          libgbm-dev libwayland-dev libegl-dev libopenblas-dev mold

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        override: true
        rustflags: ""
        target: x86_64-unknown-linux-gnu

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/screenpipe-app-tauri/src-tauri
        shared-key: screenpipe-tauri-e2e

    - name: Install frontend dependencies
      working-directory: ./apps/screenpipe-app-tauri
      run: bun install --frozen-lockfile

    - name: Cache Linux build artifacts
      uses: actions/cache@v4
      with:
        path: |
          apps/screenpipe-app-tauri/src-tauri/ffmpeg
          apps/screenpipe-app-tauri/src-tauri/tesseract
          apps/screenpipe-app-tauri/src-tauri/bun-x86_64-unknown-linux-gnu
        key: Linux-e2e-artifacts-v2-${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        restore-keys: |
          Linux-e2e-artifacts-v2-

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ./apps/screenpipe-app-tauri/.next
        key: ${{ runner.os }}-next-v2-${{ hashFiles('apps/screenpipe-app-tauri/package.json', 'apps/screenpipe-app-tauri/bun.lock', 'apps/screenpipe-app-tauri/next.config.mjs', 'apps/screenpipe-app-tauri/postcss.config.mjs', 'apps/screenpipe-app-tauri/app/**', 'apps/screenpipe-app-tauri/components/**', 'apps/screenpipe-app-tauri/lib/**', 'apps/screenpipe-app-tauri/styles/**') }}
        restore-keys: |
          ${{ runner.os }}-next-v2-

    - name: Build
      uses: tauri-apps/tauri-action@v0.5.17
      with:
        args: "--no-sign --debug --no-bundle -- --features e2e"
        projectPath: "./apps/screenpipe-app-tauri"
        tauriScript: bunx tauri -v

    - name: Set up virtual display with window manager
      run: .github/scripts/setup_display.sh

    - name: Setup audio
      run: .github/scripts/setup_audio.sh

    - name: Run E2E Tests
      shell: bash
      working-directory: ./apps/screenpipe-app-tauri
      run: |
        export XDG_RUNTIME_DIR=/run/user/$(id -u)
        export XDG_CONFIG_HOME="$HOME/.config"
        export XDG_DATA_HOME="$HOME/.local/share"
        export XDG_CACHE_HOME="$HOME/.cache"
        export PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
        export DISPLAY=:99
        export RECORD_VIDEO=1

        bun run test:e2e

    - name: Upload E2E Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linux-e2e-test-artifacts
        path: |
          ./apps/screenpipe-app-tauri/e2e/videos
          ./apps/screenpipe-app-tauri/e2e/screenshots

    - name: Upload Screenpipe data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linux-screenpipe-data
        include-hidden-files: true
        path: ./apps/screenpipe-app-tauri/.e2e
