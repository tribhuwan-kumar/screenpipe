name: Release App (Windows, artifacts only)

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: "Commit hash to build from (optional)"
        required: false
      version:
        description: "Version to set in Cargo.toml (required if commit_hash is provided)"
        required: false

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            bun_version: "1.3.7"
            artifact_suffix: x64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bun_version: "1.3.10"
            artifact_suffix: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Enable Git long paths on Windows
        shell: powershell
        run: |
          Write-Host "Enabling git core.longpaths..."
          git config --global core.longpaths true
          $longpaths = git config --global --get core.longpaths
          Write-Host "core.longpaths is set to: $longpaths"
          if ($longpaths -ne "true") {
            throw "Failed to enable git long paths"
          }
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash || github.ref }}

      - name: Shorten target dir to avoid MAX_PATH (Windows)
        shell: powershell
        run: |
          $targetDir = "apps\screenpipe-app-tauri\src-tauri\target"
          $shortDir = "C:\t"
          if (Test-Path $shortDir) { Remove-Item -Recurse -Force $shortDir }
          New-Item -ItemType Directory -Force -Path $shortDir | Out-Null
          if (Test-Path $targetDir) { Remove-Item -Recurse -Force $targetDir }
          cmd /c mklink /J $targetDir $shortDir
          Write-Host "Created junction: $targetDir -> $shortDir"
      - name: Update version in Cargo.toml
        if: github.event.inputs.commit_hash && github.event.inputs.version
        shell: pwsh
        run: |
          $content = Get-Content apps/screenpipe-app-tauri/src-tauri/Cargo.toml
          $content = $content -replace '^version = ".*"', ('version = "' + '${{ github.event.inputs.version }}' + '"')
          $content | Set-Content apps/screenpipe-app-tauri/src-tauri/Cargo.toml -Force
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun_version }}

      - name: Install frontend dependencies
        working-directory: ${{ github.workspace }}/apps/screenpipe-app-tauri
        run: bun install

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: powershell
        run: |
          winget install Ninja-build.Ninja --accept-package-agreements --accept-source-agreements --silent
          $paths = @("C:\Program Files\Ninja", "C:\Tools\Ninja")
          foreach ($p in $paths) {
            if (Test-Path "$p\ninja.exe") {
              echo $p | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              break
            }
          }
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          ninja --version
      - name: Install wget on Windows
        shell: powershell
        run: |
          if (Test-Path Alias:wget) {
            Remove-Item Alias:wget -Force
          }
          $wgetDir = "C:\wget"
          if (Test-Path "$wgetDir\wget.exe") {
            Write-Host "wget already installed, skipping download"
          } else {
            New-Item -ItemType Directory -Force -Path $wgetDir
            $wgetUrl = "https://eternallybored.org/misc/wget/releases/wget-1.21.4-win64.zip"
            $wgetZip = "$wgetDir\wget.zip"
            Invoke-WebRequest -Uri $wgetUrl -OutFile $wgetZip
            Expand-Archive -Path $wgetZip -DestinationPath $wgetDir -Force
            Remove-Item $wgetZip
          }
          $env:Path = "$wgetDir;$env:Path"
          & "$wgetDir\wget.exe" --version
      - name: Run pre_build.js
        run: bun ./scripts/pre_build.js
        working-directory: ${{ github.workspace }}/apps/screenpipe-app-tauri

      - name: Use production config for release
        shell: powershell
        run: cp apps/screenpipe-app-tauri/src-tauri/tauri.prod.conf.json apps/screenpipe-app-tauri/src-tauri/tauri.conf.json

      - name: Build
        working-directory: apps/screenpipe-app-tauri
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_INCREMENTAL: "true"
          CARGO_PROFILE_RELEASE_STRIP: none
          CARGO_PROFILE_RELEASE_PANIC: abort
          CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
          RUSTFLAGS: -C link-arg=/LTCG
          CMAKE_ARGS: -DGGML_NATIVE=OFF -DGGML_AVX512=OFF -DGGML_AVX512_VBMI=OFF -DGGML_AVX512_VNNI=OFF -DGGML_AVX512_BF16=OFF
        run: bunx tauri build  --no-sign --verbose --target ${{ matrix.target }} --features official-build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenpipe-windows-${{ matrix.artifact_suffix }}-${{ github.run_number }}
          path: apps/screenpipe-app-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/
          retention-days: 7
